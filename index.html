<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BCF Script Editor</title>
  <style>
    :root { --bg:#161A17; --surface:#1D211E; --border:#2E332F;
            --green:#4D9D37; --green-lift:#7BC167; --text:#E4E9E5; --dim:#8A938C; }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      background: var(--bg); color: var(--text);
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased; padding: 24px;
    }
    .card { text-align: center; max-width: 420px; }
    .mark {
      font-size: 13px; font-weight: 700; letter-spacing: 3px;
      color: var(--green); margin-bottom: 4px;
    }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 10px; letter-spacing: .3px; }
    p { font-size: 14px; line-height: 1.6; color: var(--dim); margin: 0 0 28px; }
    a.btn {
      display: inline-block; text-decoration: none;
      background: var(--green); color: #0E120F;
      font-size: 14px; font-weight: 600; letter-spacing: .3px;
      padding: 12px 26px; border-radius: 8px;
      transition: background .15s ease;
    }
    a.btn:hover { background: var(--green-lift); }
    .note { margin-top: 26px; font-size: 11.5px; color: var(--dim); opacity: .8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="mark">BCF</div>
    <h1>BCF Script Editor</h1>
    <p>A browser-based editor for writing, validating, and optimizing
       Vulcan block-calculation (<code>.bcf</code>) scripts.</p>
    <a class="btn" href="./BCF_Editor.html">Open the editor &rarr;</a>
    <div class="note">An independent tool &middot; not an official Maptek product or release.</div>
  </div>
</body>
</html>
